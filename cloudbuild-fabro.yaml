# Cloud Build config to build and deploy Fabro backend to Cloud Run
# Run from project root: gcloud builds submit --config=cloudbuild-fabro.yaml .

steps:
  - name: "gcr.io/cloud-builders/docker"
    args:
      - "build"
      - "-t"
      - "gcr.io/${PROJECT_ID}/fabro-backend:${BUILD_ID}"
      - "-t"
      - "gcr.io/${PROJECT_ID}/fabro-backend:latest"
      - "-f"
      - "fabro-backend/Dockerfile"
      - "fabro-backend"
    dir: "."

  - name: "gcr.io/cloud-builders/docker"
    args:
      - "push"
      - "gcr.io/${PROJECT_ID}/fabro-backend:${BUILD_ID}"
    dir: "."

  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: gcloud
    args:
      - "run"
      - "deploy"
      - "fabro-backend"
      - "--image"
      - "gcr.io/${PROJECT_ID}/fabro-backend:${BUILD_ID}"
      - "--region"
      - "us-central1"
      - "--platform"
      - "managed"
      - "--allow-unauthenticated"

images:
  - "gcr.io/${PROJECT_ID}/fabro-backend:${BUILD_ID}"
  - "gcr.io/${PROJECT_ID}/fabro-backend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
